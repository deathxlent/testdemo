<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PONG - 1972 Arcade Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }
        .player-list {
            background: #111;
            border: 2px solid #fff;
            padding: 15px;
            width: 250px;
        }
        .player-list h3 {
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .player-item {
            padding: 10px;
            margin: 5px 0;
            background: #222;
            border: 1px solid #444;
            cursor: pointer;
            font-size: 12px;
        }
        .player-item:hover {
            background: #333;
        }
        .player-item.self {
            border-color: #0f0;
        }
        .player-stats {
            font-size: 10px;
            color: #aaa;
            margin-top: 5px;
        }
        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #gameCanvas {
            background: #000;
            border: 2px solid #fff;
        }
        .status {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }
        .controls {
            margin-top: 10px;
            font-size: 12px;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="player-list">
            <h3>LEFT PLAYERS</h3>
            <div id="leftPlayers"></div>
        </div>
        <div class="game-container">
            <canvas id="gameCanvas" width="600" height="400"></canvas>
            <div class="status" id="status">Waiting for opponent...</div>
            <div class="controls">Use W/S or Up/Down arrows to move paddle</div>
        </div>
        <div class="player-list">
            <h3>RIGHT PLAYERS</h3>
            <div id="rightPlayers"></div>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
