<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>LLM Chat</h1>
                <button id="newChatBtn" class="new-chat-btn" title="新建会话">+ 新会话</button>
            </div>
            <div class="session-list" id="sessionList"></div>
        </aside>
        <main class="chat-area">
            <div class="chat-header" id="chatHeader">
                <span class="chat-title">选择或创建一个会话开始聊天</span>
                <button id="deleteSessionBtn" class="delete-session-btn" title="删除当前会话" style="display:none;">删除会话</button>
            </div>
            <div class="messages-container" id="messagesContainer"></div>
            <div class="input-area">
                <textarea id="messageInput" placeholder="输入消息... (Shift+Enter 换行, Enter 发送)" rows="3"></textarea>
                <button id="sendBtn" class="send-btn">发送</button>
            </div>
        </main>
    </div>
    <div id="toast" class="toast"></div>
    <script src="app.js"></script>
</body>
</html>
