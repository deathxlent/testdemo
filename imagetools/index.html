<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageTools - 图片工具</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="left-panel">
            <div class="panel-section">
                <div class="panel-title">文件</div>
                <button class="panel-btn" id="uploadBtn" data-tip="打开图片|从本地选择一张或多张图片进行编辑，支持拖拽图片到画布区域">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2h5v1H3v10h10V7h1v6.5a.5.5 0 01-.5.5h-11a.5.5 0 01-.5-.5v-11a.5.5 0 01.5-.5H2z"/><path d="M11 1h4v4h-1V2.7l-4.5 4.5-.7-.7L13.3 2H11V1z"/></svg>
                    <span>打开图片</span>
                </button>
                <button class="panel-btn" id="exportBtn" data-tip="导出图片|将编辑后的图片保存到本地，支持 PNG/JPG/WebP 等格式">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2h5v1H3v10h10V7h1v6.5a.5.5 0 01-.5.5h-11a.5.5 0 01-.5-.5v-11a.5.5 0 01.5-.5H2z"/><path d="M8 1v8.3L5.4 6.7l-.7.7 4 4 4-4-.7-.7L9 9.3V1H8z"/></svg>
                    <span>导出图片</span>
                </button>
            </div>
            <div class="panel-section">
                <div class="panel-title">工具</div>
                <div class="tool-grid">
                    <button class="tool-icon active" id="selectTool" data-tip="选择工具 (V)|用于选择和移动画布上的文字、水印等对象，点击空白处可取消选择">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><path d="M3 2l1-1 9 7.5L8 9l2.5 6.5-1.5.6L6.5 9.5 3 12V2z"/></svg>
                    </button>
                    <button class="tool-icon" id="textTool" data-tip="文字工具 (T)|在画布上点击并拖拽创建文字框，双击文字可进入编辑模式修改内容">
                        <span style="font-weight:700;font-size:16px;font-family:serif">T</span>
                    </button>
                    <button class="tool-icon" id="watermarkTool" data-tip="图片水印|点击后选择水印图片，可拖拽移动、调整大小和旋转，支持调整透明度">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="14" height="14" rx="2"/><path d="M2 13l4-4 3 3 2-2 5 5"/><circle cx="7" cy="6" r="1.5"/></svg>
                    </button>
                    <button class="tool-icon" id="resizeTool" data-tip="调整大小|修改整张图片的像素尺寸，可锁定宽高比例，输入数值后点击应用">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 10V3h7M15 8v7H8M3 3l7 7M15 15L8 8"/></svg>
                    </button>
                    <button class="tool-icon" id="cropTool" data-tip="自由裁剪|在画布上拖拽任意区域进行裁剪，调整裁剪框后双击或点应用按钮执行">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 1h2v2H5zM1 5h2v2H1zM11 15h2v2h-2zM15 11h2v2h-2zM5 5h10v10H5z"/></svg>
                    </button>
                    <button class="tool-icon" id="rectCropTool" data-tip="长方形抠图|指定宽高创建固定比例抠图框，拖拽定位后双击执行抠图，常用于证件照等">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="12" height="8" rx="0.5" stroke-dasharray="2,2"/><path d="M3 9h12M9 5v8"/></svg>
                    </button>
                    <button class="tool-icon" id="maskTool" data-tip="蒙版|支持长方形/圆形/椭圆/自定义多边形蒙版，只保留选区内的图像内容">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="9" r="6"/><path d="M3 9h12M9 3v12M4.7 4.7l8.6 8.6M13.3 4.7L4.7 13.3"/></svg>
                    </button>
                    <button class="tool-icon" id="rotateTool" data-tip="旋转|自由旋转图片角度，可拖拽红点调整旋转中心，支持一键顺时针/逆时针90度">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 3v3l2.5-2L9 2z"/><path d="M15 9a6 6 0 11-2.5-4.9"/></svg>
                    </button>
                    <button class="tool-icon" id="mirrorHBtn" data-tip="左右镜像|将图片沿垂直轴翻转，左右内容互换，立即生效无需确认">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 2v14M14 5l-3 4 3 4zM7 5l3 4-3 4z"/></svg>
                    </button>
                    <button class="tool-icon" id="mirrorVBtn" data-tip="上下镜像|将图片沿水平轴翻转，上下内容互换，立即生效无需确认">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 9h14M5 14l4-3 4 3zM5 7l4 3 4-3z"/></svg>
                    </button>
                    <button class="tool-icon" id="sharpenTool" data-tip="锐化|增强图像边缘清晰度，可先创建选区局部应用，调整强度后双击应用">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 2l3 6 6 1-4.5 4 1 6L9 15l-5.5 4 1-6L0 9l6-1z"/></svg>
                    </button>
                    <button class="tool-icon" id="blurTool" data-tip="模糊化|对图像进行高斯模糊处理，可创建选区局部模糊，常用于遮挡敏感内容">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="9" r="5" stroke-dasharray="2,2"/><path d="M6 6c.5-.5 1-.8 1.5-1M12 12c-.5.5-1 .8-1.5 1M5 12c.5-.5 1-.8 1.5-1M13 6c-.5.5-1 .8-1.5 1"/></svg>
                    </button>
                    <button class="tool-icon" id="mosaicTool" data-tip="马赛克化|对选区进行像素化马赛克处理，可调整马赛克块大小，常用于隐私保护">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><rect x="2" y="2" width="4" height="4" opacity="0.7"/><rect x="7" y="2" width="4" height="4" opacity="0.9"/><rect x="12" y="2" width="4" height="4" opacity="0.5"/><rect x="2" y="7" width="4" height="4" opacity="0.4"/><rect x="7" y="7" width="4" height="4" opacity="0.8"/><rect x="12" y="7" width="4" height="4" opacity="0.6"/><rect x="2" y="12" width="4" height="4" opacity="0.9"/><rect x="7" y="12" width="4" height="4" opacity="0.5"/><rect x="12" y="12" width="4" height="4" opacity="0.7"/></svg>
                    </button>
                    <button class="tool-icon" id="negativeTool" data-tip="底片化（颜色反转）|将所有颜色反转为互补色，类似胶片底片效果，对全图立即生效">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="2" width="12" height="14" rx="1" fill="currentColor" fill-opacity="0.08"/><path d="M3 9h12"/><circle cx="6" cy="6" r="1" fill="currentColor"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg>
                    </button>
                    <button class="tool-icon" id="hslTool" data-tip="色度/饱和度/亮度|整体调整图片的色相（-180°~180°）、饱和度和亮度，调整后点击应用">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="9" r="6"/><circle cx="9" cy="9" r="2.5" stroke-dasharray="1.5,1.5"/></svg>
                    </button>
                    <button class="tool-icon" id="localZoomTool" data-tip="局部放大|在画布上创建选区后将其内容放大显示，可调整放大倍数、边框样式，生成可移动的放大图层">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="7" height="7" rx="1"/><rect x="10" y="7" width="6" height="8" rx="1"/><path d="M9 6l3 4M7 10l4 2"/></svg>
                    </button>
                    <button class="tool-icon" id="pencilTool" data-tip="铅笔工具|自由绘制线条。普通拖拽：自由绘制；按住 Shift：强制直线；按住 Ctrl：路径/曲线模式，可调节锚点">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 16l3-1L14 6l-2-2L3 13l-1 3z"/><path d="M12 4l2 2"/></svg>
                    </button>
                </div>
            </div>

            <div class="panel-section" id="textPropsSection" style="display:none">
                <div class="panel-title">文字属性</div>
                <div class="prop-group">
                    <label>字体</label>
                    <select id="fontFamily">
                        <option value="Arial">Arial</option>
                        <option value="Helvetica">Helvetica</option>
                        <option value="Times New Roman">Times New Roman</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Verdana">Verdana</option>
                        <option value="Courier New">Courier New</option>
                        <option value="Impact">Impact</option>
                        <option value="Comic Sans MS">Comic Sans MS</option>
                        <option value="Microsoft YaHei">微软雅黑</option>
                        <option value="SimSun">宋体</option>
                        <option value="SimHei">黑体</option>
                        <option value="KaiTi">楷体</option>
                        <option value="FangSong">仿宋</option>
                    </select>
                </div>
                <div class="prop-group">
                    <label>大小</label>
                    <input type="number" id="fontSize" value="32" min="8" max="500" step="1">
                </div>
                <div class="prop-group btn-row">
                    <button class="style-btn" id="boldBtn" title="加粗"><b>B</b></button>
                    <button class="style-btn" id="italicBtn" title="斜体"><i>I</i></button>
                    <button class="style-btn" id="underlineBtn" title="下划线"><u>U</u></button>
                    <button class="style-btn" id="strikethroughBtn" title="删除线"><s>S</s></button>
                </div>
                <div class="prop-group">
                    <label>颜色</label>
                    <div class="color-row">
                        <input type="color" id="fontColor" value="#000000">
                        <input type="text" id="fontColorText" value="#000000" maxlength="7">
                    </div>
                </div>
                <div class="prop-group-sub">
                    <div class="sub-header">
                        <span>阴影</span>
                        <label class="toggle"><input type="checkbox" id="shadowEnabled"><span></span></label>
                    </div>
                    <div id="shadowSub" class="sub-content">
                        <div class="prop-group two-col">
                            <div>
                                <label>水平</label>
                                <input type="number" id="shadowOffsetX" value="4" min="-200" max="200" step="1">
                            </div>
                            <div>
                                <label>垂直</label>
                                <input type="number" id="shadowOffsetY" value="4" min="-200" max="200" step="1">
                            </div>
                        </div>
                        <div class="prop-group two-col">
                            <div>
                                <label>模糊</label>
                                <input type="number" id="shadowBlur" value="4" min="0" max="200" step="1">
                            </div>
                            <div>
                                <label>颜色</label>
                                <div class="color-row">
                                    <input type="color" id="shadowColor" value="#000000">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="prop-group-sub">
                    <div class="sub-header">
                        <span>描边</span>
                        <label class="toggle"><input type="checkbox" id="strokeEnabled"><span></span></label>
                    </div>
                    <div id="strokeSub" class="sub-content">
                        <div class="prop-group two-col">
                            <div>
                                <label>宽度</label>
                                <input type="number" id="strokeWidth" value="2" min="0" max="50" step="0.5">
                            </div>
                            <div>
                                <label>颜色</label>
                                <div class="color-row">
                                    <input type="color" id="strokeColor" value="#ffffff">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel-section" id="watermarkPropsSection" style="display:none">
                <div class="panel-title">水印属性</div>
                <button class="panel-btn" id="uploadWatermarkBtn">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2h5v1H3v10h10V7h1v6.5a.5.5 0 01-.5.5h-11a.5.5 0 01-.5-.5v-11a.5.5 0 01.5-.5H2z"/><path d="M11 1h4v4h-1V2.7l-4.5 4.5-.7-.7L13.3 2H11V1z"/></svg>
                    <span>上传水印</span>
                </button>
                <div class="prop-group">
                    <label>大小</label>
                    <input type="range" id="wmSize" min="10" max="400" value="100">
                </div>
                <div class="prop-group">
                    <label>旋转 (<span id="wmRotDisp">0</span>°)</label>
                    <input type="range" id="wmRotate" min="-180" max="180" value="0">
                </div>
                <div class="prop-group">
                    <label>透明度 (<span id="wmOpDisp">100</span>%)</label>
                    <input type="range" id="wmOpacity" min="0" max="100" value="100">
                </div>
                <div class="prop-group btn-row">
                    <button class="style-btn" id="wmLayerUp" title="上移一层">↑</button>
                    <button class="style-btn" id="wmLayerTop" title="置于顶层">⇈</button>
                    <button class="style-btn" id="wmLayerDown" title="下移一层">↓</button>
                    <button class="style-btn" id="wmLayerBottom" title="置于底层">⇊</button>
                </div>
            </div>

            <div class="panel-section" id="resizePropsSection" style="display:none">
                <div class="panel-title">调整大小</div>
                <div class="prop-group two-col">
                    <div>
                        <label>宽度 (px)</label>
                        <input type="number" id="resizeWidth" min="1" step="1">
                    </div>
                    <div>
                        <label>高度 (px)</label>
                        <input type="number" id="resizeHeight" min="1" step="1">
                    </div>
                </div>
                <div class="prop-group">
                    <label class="chk-label">
                        <input type="checkbox" id="resizeLock" checked>
                        <span>锁定比例</span>
                    </label>
                </div>
                <button class="panel-btn" id="applyResize">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M3 10V3h7M15 8v7H8M3 3l7 7M15 15L8 8"/></svg>
                    <span>应用缩放</span>
                </button>
            </div>

            <div class="panel-section" id="cropPropsSection" style="display:none">
                <div class="panel-title">自由裁剪</div>
                <div class="prop-group-sub">
                    <div class="sub-header">
                        <span>裁剪尺寸</span>
                    </div>
                    <div class="sub-content">
                        <div class="prop-group two-col">
                            <div>
                                <label>起始 X</label>
                                <input type="number" id="cropX" min="0" step="1">
                            </div>
                            <div>
                                <label>起始 Y</label>
                                <input type="number" id="cropY" min="0" step="1">
                            </div>
                        </div>
                        <div class="prop-group two-col">
                            <div>
                                <label>宽度</label>
                                <input type="number" id="cropW" min="1" step="1">
                            </div>
                            <div>
                                <label>高度</label>
                                <input type="number" id="cropH" min="1" step="1">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="prop-group btn-row">
                    <button class="style-btn" id="resetCropBtn" title="重置">重置</button>
                </div>
                <button class="panel-btn" id="applyCrop">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M5 1h2v2H5zM1 5h2v2H1zM11 15h2v2h-2zM15 11h2v2h-2zM5 5h10v10H5z"/></svg>
                    <span>执行裁剪 (双击区域)</span>
                </button>
            </div>

            <div class="panel-section" id="rectCropPropsSection" style="display:none">
                <div class="panel-title">长方形抠图</div>
                <div class="prop-group two-col">
                    <div>
                        <label>宽度 (px)</label>
                        <input type="number" id="rectCropW" value="400" min="1" step="1">
                    </div>
                    <div>
                        <label>高度 (px)</label>
                        <input type="number" id="rectCropH" value="300" min="1" step="1">
                    </div>
                </div>
                <div class="prop-group">
                    <label class="chk-label">
                        <input type="checkbox" id="rectCropLock">
                        <span>锁定比例</span>
                    </label>
                </div>
                <button class="panel-btn" id="createRectCrop">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="3" width="12" height="10" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
                    <span>创建抠图框</span>
                </button>
                <div class="panel-tip">拖动框定位，双击框执行抠图</div>
            </div>

            <div class="panel-section" id="maskPropsSection" style="display:none">
                <div class="panel-title">蒙版</div>
                <div class="prop-group">
                    <label>蒙版类型</label>
                    <select id="maskType">
                        <option value="rect">长方形</option>
                        <option value="circle">圆形</option>
                        <option value="ellipse">椭圆形</option>
                        <option value="polygon">自定义多边形</option>
                    </select>
                </div>
                <div id="maskSizeInfo" class="prop-group-sub">
                    <div class="sub-header">
                        <span>尺寸设置</span>
                    </div>
                    <div class="sub-content" id="maskSizeContent"></div>
                </div>
                <button class="panel-btn" id="createMaskBtn">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
                    <span>创建蒙版区域</span>
                </button>
                <button class="panel-btn" id="clearMaskPoints" style="display:none">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M3 3l10 10M13 3L3 13"/></svg>
                    <span>清除多边形点</span>
                </button>
                <div class="panel-tip">拖动调整位置大小，双击区域执行蒙版</div>
            </div>

            <div class="panel-section" id="rotatePropsSection" style="display:none">
                <div class="panel-title">旋转</div>
                <div class="prop-group">
                    <label>角度 (<span id="rotateAngleDisp">0</span>°)</label>
                    <input type="range" id="rotateAngle" min="-180" max="180" value="0">
                </div>
                <div class="prop-group two-col">
                    <div>
                        <label>旋转中心 X</label>
                        <input type="number" id="rotateCX" min="0" step="1">
                    </div>
                    <div>
                        <label>旋转中心 Y</label>
                        <input type="number" id="rotateCY" min="0" step="1">
                    </div>
                </div>
                <div class="panel-tip">或直接拖动画面中心的红色圆点移动旋转中心</div>
                <div class="prop-group btn-row">
                    <button class="style-btn" id="rotateLeft90" title="逆时针90°">↺</button>
                    <button class="style-btn" id="rotateRight90" title="顺时针90°">↻</button>
                    <button class="style-btn" id="rotateReset" title="重置">重置</button>
                </div>
                <button class="panel-btn" id="applyRotate">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2v3l2.5-2L8 1z"/><path d="M14 8a6 6 0 11-2.5-4.9"/></svg>
                    <span>应用旋转 (重绘)</span>
                </button>
            </div>

            <div class="panel-section" id="filterPropsSection" style="display:none">
                <div class="panel-title" id="filterTitle">滤镜</div>
                <div class="prop-group">
                    <label>选区类型</label>
                    <select id="filterSelType">
                        <option value="rect">长方形</option>
                        <option value="circle">圆形</option>
                        <option value="ellipse">椭圆形</option>
                        <option value="polygon">自定义多边形</option>
                    </select>
                </div>
                <div class="prop-group-sub" id="filterSizeSub">
                    <div class="sub-header"><span>尺寸设置</span></div>
                    <div class="sub-content" id="filterSizeContent"></div>
                </div>
                <button class="panel-btn" id="createFilterSel">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="10"/></svg>
                    <span>创建选区</span>
                </button>
                <button class="panel-btn" id="clearFilterSel" style="display:none">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M3 3l10 10M13 3L3 13"/></svg>
                    <span>清除多边形点</span>
                </button>
                <div class="prop-group" id="filterStrengthGroup" style="display:none">
                    <label>强度 (<span id="filterStrengthDisp">50</span>%)</label>
                    <input type="range" id="filterStrength" min="1" max="100" value="50">
                </div>
                <div class="prop-group" id="filterMosaicGroup" style="display:none">
                    <label>马赛克块大小 (<span id="mosaicSizeDisp">10</span>px)</label>
                    <input type="range" id="mosaicSize" min="2" max="50" value="10">
                </div>
                <button class="panel-btn primary" id="applyFilter">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2 8l4 4 8-9"/></svg>
                    <span>应用效果</span>
                </button>
                <div class="panel-tip">先创建选区并调整 → 双击选区或点应用按钮</div>
            </div>

            <div class="panel-section" id="hslPropsSection" style="display:none">
                <div class="panel-title">色彩调整 (全图)</div>
                <div class="prop-group">
                    <label>色相 (<span id="hueDisp">0</span>°)</label>
                    <input type="range" id="hueAdjust" min="-180" max="180" value="0">
                </div>
                <div class="prop-group">
                    <label>饱和度 (<span id="satDisp">0</span>%)</label>
                    <input type="range" id="satAdjust" min="-100" max="100" value="0">
                </div>
                <div class="prop-group">
                    <label>亮度 (<span id="lumDisp">0</span>%)</label>
                    <input type="range" id="lumAdjust" min="-100" max="100" value="0">
                </div>
                <div class="prop-group btn-row">
                    <button class="style-btn" id="resetHsl">重置</button>
                </div>
                <button class="panel-btn primary" id="applyHsl">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2 8l4 4 8-9"/></svg>
                    <span>应用调整</span>
                </button>
            </div>

            <div class="panel-section" id="localZoomPropsSection" style="display:none">
                <div class="panel-title">局部放大</div>
                <div class="prop-group">
                    <label>选区形状</label>
                    <select id="lzShape">
                        <option value="rect">长方形</option>
                        <option value="ellipse">椭圆形</option>
                    </select>
                </div>
                <button class="panel-btn" id="createLzSel">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="10"/></svg>
                    <span>创建选区</span>
                </button>
                <div class="prop-group two-col">
                    <div>
                        <label>边框颜色</label>
                        <div class="color-row">
                            <input type="color" id="lzBorderColor" value="#ff0000">
                        </div>
                    </div>
                    <div>
                        <label>边框宽度</label>
                        <input type="number" id="lzBorderWidth" min="0" max="20" value="2" step="1">
                    </div>
                </div>
                <div class="prop-group">
                    <label>边框样式</label>
                    <select id="lzBorderStyle">
                        <option value="solid">实线 Solid</option>
                        <option value="dashed">虚线 Dashed</option>
                        <option value="dotted">点线 Dotted</option>
                        <option value="double">双线 Double</option>
                        <option value="none">无</option>
                    </select>
                </div>
                <div class="prop-group">
                    <label>放大倍数 (<span id="lzZoomDisp">2.00</span>×)</label>
                    <input type="range" id="lzZoom" min="1.5" max="5" step="0.1" value="2">
                </div>
                <div class="panel-tip">调整好后双击选区创建放大图层，放大图层可拖动</div>
            </div>

            <div class="panel-section" id="pencilPropsSection" style="display:none">
                <div class="panel-title">铅笔工具</div>
                <div class="prop-group two-col">
                    <div>
                        <label>颜色</label>
                        <div class="color-row">
                            <input type="color" id="pencilColor" value="#000000">
                            <input type="text" id="pencilColorText" value="#000000" maxlength="7">
                        </div>
                    </div>
                    <div>
                        <label>粗细 (px)</label>
                        <input type="number" id="pencilWidth" min="1" max="100" value="2" step="1">
                    </div>
                </div>
                <div class="prop-group">
                    <label>透明度 (<span id="pencilOpacityDisp">100</span>%)</label>
                    <input type="range" id="pencilOpacity" min="1" max="100" value="100">
                </div>
                <div class="prop-group">
                    <label>线端/拐角</label>
                    <select id="pencilCap">
                        <option value="round">圆角 Round</option>
                        <option value="butt">平头 Butt</option>
                        <option value="square">方头 Square</option>
                    </select>
                </div>
                <div class="prop-group btn-row">
                    <button class="style-btn" id="clearPencilLayer">清除铅笔层</button>
                </div>
                <div class="panel-tip">普通拖拽：自由绘制；按住 Shift：强制直线；按住 Ctrl：路径/曲线模式</div>
            </div>
        </div>

        <div class="center-area">
            <div class="tab-bar" id="tabBar"></div>
            <div class="canvas-container" id="canvasContainer">
                <div class="canvas-scroll-content" id="canvasScrollContent">
                    <div class="upload-hint" id="uploadHint">
                        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2"><rect x="8" y="8" width="48" height="48" rx="4"/><path d="M20 40l8-10 6 6 10-14"/><circle cx="22" cy="22" r="4"/></svg>
                        <p>拖拽图片到此处</p>
                        <p class="sub">或点击选择本地图片</p>
                    </div>
                    <div class="canvas-wrapper" id="canvasWrapper" style="display:none">
                        <canvas id="mainCanvas"></canvas>
                        <div class="object-layer" id="objectLayer"></div>
                        <div class="selection-rect" id="selectionRect" style="display:none"></div>
                        <div class="img-operation-layer" id="imgOperationLayer"></div>
                        <div class="rotate-center-handle" id="rotateCenterHandle" style="display:none"></div>
                    </div>
                </div>
            </div>
            <div class="zoom-bar" id="zoomBar" style="display:none">
                <button class="zoom-btn" id="infoBtn" data-tip="图片信息|查看图片分辨率、格式、大小等详细元数据">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M8 5v.01M7.5 7.5h.5v4h.5"/></svg>
                </button>
                <button class="zoom-btn" id="histogramBtn" data-tip="直方图|查看图片亮度和RGB颜色通道分布统计">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 14V8M5 14V5M8 14V2M11 14V6M14 14V4"/></svg>
                </button>
                <div class="zoom-sep"></div>
                <button class="zoom-btn" id="zoomOutBtn" data-tip="缩小|将画面显示比例缩小10%，快捷键：Ctrl + 滚轮">−</button>
                <div class="zoom-slider-wrap">
                    <input type="range" id="zoomSlider" min="5" max="500" value="100" step="1" data-tip="缩放滑块|拖动调整画面显示比例（5%-500%）">
                </div>
                <button class="zoom-btn" id="zoomInBtn" data-tip="放大|将画面显示比例放大10%，快捷键：Ctrl + 滚轮">+</button>
                <span class="zoom-display" id="zoomDisplay">100%</span>
                <button class="zoom-btn" id="zoomFitBtn" data-tip="适应窗口|自动调整缩放使图片完整显示在画布区域">⊡</button>
            </div>
        </div>

        <div class="right-panel">
            <div class="panel-title right-panel-title">对象</div>
            <div class="object-list" id="objectList"></div>

            <div class="panel-title right-panel-title history-title-bar">
                <span>操作步骤</span>
                <button class="history-clear" id="historyClearBtn" title="清除历史记录">清空</button>
            </div>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <div class="modal-overlay" id="infoModal" style="display:none">
        <div class="modal-box">
            <div class="modal-header">
                <span>图片信息</span>
                <button class="modal-close" id="infoModalClose">&times;</button>
            </div>
            <div class="modal-body" id="infoModalBody"></div>
        </div>
    </div>

    <div class="modal-overlay" id="histogramModal" style="display:none">
        <div class="modal-box modal-wide">
            <div class="modal-header">
                <span>颜色直方图</span>
                <button class="modal-close" id="histogramModalClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="histogram-tabs">
                    <button class="hist-tab active" data-channel="luminance">亮度</button>
                    <button class="hist-tab" data-channel="red">红色</button>
                    <button class="hist-tab" data-channel="green">绿色</button>
                    <button class="hist-tab" data-channel="blue">蓝色</button>
                    <button class="hist-tab" data-channel="rgb">RGB 叠加</button>
                </div>
                <div class="histogram-wrap">
                    <canvas id="histogramCanvas"></canvas>
                </div>
                <div class="histogram-stats" id="histogramStats"></div>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
    <input type="file" id="watermarkInput" accept="image/*" style="display:none">

    <script src="js/core.js"></script>
    <script src="js/images.js"></script>
    <script src="js/history.js"></script>
    <script src="js/text-tool.js"></script>
    <script src="js/text-style.js"></script>
    <script src="js/watermark.js"></script>
    <script src="js/objects.js"></script>
    <script src="js/export.js"></script>
    <script src="js/image-resize.js"></script>
    <script src="js/image-crop.js"></script>
    <script src="js/image-mask.js"></script>
    <script src="js/image-transform.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/local-zoom.js"></script>
    <script src="js/pencil.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
