<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Browser CS - Dust2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        #gameCanvas {
            display: block;
        }
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 100;
        }
        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: #fff;
        }
        #crosshair::before {
            width: 20px;
            height: 2px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        #crosshair::after {
            width: 2px;
            height: 20px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        #hud {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #fff;
            font-size: 18px;
            z-index: 100;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #ammo {
            font-size: 32px;
            font-weight: bold;
        }
        #health {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #fff;
            font-size: 24px;
            z-index: 100;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #playerList {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 16px;
            z-index: 100;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.5);
            padding: 10px 15px;
            border-radius: 5px;
        }
        #playerCount {
            font-weight: bold;
            color: #00ff00;
        }
        #startScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: #fff;
        }
        #startScreen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ff6600;
            text-shadow: 0 0 20px #ff6600;
        }
        #startScreen p {
            font-size: 18px;
            margin: 10px 0;
            color: #ccc;
        }
        #startBtn {
            margin-top: 30px;
            padding: 15px 50px;
            font-size: 24px;
            background: #ff6600;
            border: none;
            color: #fff;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }
        #startBtn:hover {
            background: #ff8800;
            transform: scale(1.05);
            box-shadow: 0 0 20px #ff6600;
        }
        #mobileControls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 150;
            display: none;
        }
        #joystick {
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            position: relative;
            border: 3px solid rgba(255,255,255,0.4);
        }
        #joystickKnob {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        #fireBtn {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 80px;
            height: 80px;
            background: rgba(255,0,0,0.5);
            border-radius: 50%;
            z-index: 150;
            display: none;
            border: 3px solid rgba(255,255,255,0.6);
        }
        #lookArea {
            position: fixed;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            z-index: 140;
            display: none;
        }
        #hitMarker {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 101;
            opacity: 0;
            transition: opacity 0.1s;
        }
        #hitMarker.active {
            opacity: 1;
        }
        #hitMarker::before,
        #hitMarker::after {
            content: '';
            position: absolute;
            background: #ff0000;
            width: 15px;
            height: 3px;
        }
        #hitMarker::before {
            transform: rotate(45deg);
        }
        #hitMarker::after {
            transform: rotate(-45deg);
        }
        @media (max-width: 768px) {
            #mobileControls, #fireBtn, #lookArea {
                display: block;
            }
            #startScreen h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <h1>BROWSER CS</h1>
        <p>🎮 WASD - 移动</p>
        <p>🖱️ 鼠标 - 瞄准</p>
        <p>🔫 左键 - 射击</p>
        <p>⬆️ 空格 - 跳跃</p>
        <p>📱 触摸屏设备支持虚拟摇杆</p>
        <button id="startBtn">开始游戏</button>
    </div>
    
    <canvas id="gameCanvas"></canvas>
    
    <div id="crosshair"></div>
    <div id="hitMarker"></div>
    
    <div id="hud">
        <div id="ammo">30 / 90</div>
        <div>M4A1</div>
    </div>
    
    <div id="health">❤️ 100 HP</div>
    
    <div id="playerList">
        <div id="playerCount">在线玩家: 1</div>
    </div>
    
    <div id="mobileControls">
        <div id="joystick">
            <div id="joystickKnob"></div>
        </div>
    </div>
    <div id="fireBtn"></div>
    <div id="lookArea"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
